<!DOCTYPE html>
<html>
<head>
  <title>Login - BookBotAI</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, 0.22), transparent 30%),
        radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.20), transparent 30%),
        #020617;
    }

    .glass {
      background: rgba(15, 23, 42, 0.78);
      backdrop-filter: blur(18px);
    }
  </style>
</head>

<body class="text-white min-h-screen flex items-center justify-center px-6">

  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <a href="index.html">
        <img src="assets/bookbotai-logo.png" class="h-20 mx-auto rounded-2xl" alt="BookBotAI Logo">
      </a>
    </div>

    <div class="glass border border-slate-700 p-8 rounded-3xl shadow-2xl">

      <h1 class="text-4xl font-black mb-2">Welcome back</h1>
      <p class="text-slate-400 mb-6">Login to your AI booking workspace.</p>

      <input id="email" class="w-full mb-3 p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:ring-2 focus:ring-cyan-400" placeholder="Email">

      <input id="password" type="password" class="w-full mb-4 p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:ring-2 focus:ring-cyan-400" placeholder="Password">

      <button onclick="login()" class="bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-950 w-full py-4 rounded-2xl font-black hover:scale-105 transition">
        Login
      </button>

      <p id="status" class="text-slate-400 mt-4 text-center"></p>

      <p class="text-slate-400 mt-5 text-center">
        No account?
        <a href="register.html" class="text-cyan-300 font-semibold">Register</a>
      </p>

      <div class="bg-slate-800 mt-6 p-4 rounded-2xl text-sm text-slate-300 border border-slate-700">
        <p class="font-bold mb-1 text-white">Demo Admin Login</p>
        <p>Email: admin@bookbot.com</p>
        <p>Password: admin123</p>
      </div>

    </div>

  </div>

  <script>
    const API = "https://bookbot-ai-booking.onrender.com";

    function showStatus(message) {
      document.getElementById("status").innerHTML = message;
    }

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (email === "" || password === "") {
        showStatus("Please fill all fields.");
        return;
      }

      showStatus("Logging in...");

      const url =
        API +
        "/login?email=" +
        encodeURIComponent(email) +
        "&password=" +
        encodeURIComponent(password);

      try {
        const response = await fetch(url, {
          method: "POST"
        });

        const data = await response.json();

        if (data.success === false) {
          showStatus(data.message);
          return;
        }

        localStorage.setItem("bookbot_user", JSON.stringify(data.user));

        showStatus("Login successful. Redirecting...");

        setTimeout(function () {
          if (data.user.role === "admin") {
            window.location.href = "admin.html";
          } else {
            window.location.href = "dashboard.html";
          }
        }, 600);

      } catch (error) {
        showStatus("Could not connect to backend.");
      }
    }
  </script>

</body>
</html>
