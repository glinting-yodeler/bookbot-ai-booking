<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard - BookBotAI</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, 0.20), transparent 30%),
        radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.20), transparent 30%),
        #020617;
    }

    .glass {
      background: rgba(15, 23, 42, 0.80);
      backdrop-filter: blur(18px);
    }
  </style>
</head>

<body class="text-white min-h-screen">

  <div class="max-w-7xl mx-auto p-6">

    <div class="flex flex-col md:flex-row justify-between md:items-center gap-5 mb-8">
      <div class="flex items-center gap-4">
        <img src="assets/bookbotai-logo.png" class="h-16 rounded-2xl" alt="BookBotAI Logo">
        <div>
          <h1 class="text-4xl font-black">Admin Dashboard</h1>
          <p id="welcome" class="text-slate-400 mt-1"></p>
        </div>
      </div>

      <button onclick="logout()" class="bg-red-500/90 px-5 py-3 rounded-2xl hover:bg-red-400 font-bold">
        Logout
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-6 gap-4 mb-6">

      <div class="glass p-5 rounded-3xl border border-slate-700 hover:scale-105 transition">
        <p class="text-slate-400">Customers</p>
        <h2 id="totalCustomers" class="text-3xl font-black text-cyan-300">0</h2>
      </div>

      <div class="glass p-5 rounded-3xl border border-slate-700 hover:scale-105 transition">
        <p class="text-slate-400">Total Slots</p>
        <h2 id="totalSlots" class="text-3xl font-black text-blue-300">0</h2>
      </div>

      <div class="glass p-5 rounded-3xl border border-slate-700 hover:scale-105 transition">
        <p class="text-slate-400">Available</p>
        <h2 id="availableSlots" class="text-3xl font-black text-green-300">0</h2>
      </div>

      <div class="glass p-5 rounded-3xl border border-slate-700 hover:scale-105 transition">
        <p class="text-slate-400">Confirmed</p>
        <h2 id="confirmedBookings" class="text-3xl font-black text-purple-300">0</h2>
      </div>

      <div class="glass p-5 rounded-3xl border border-slate-700 hover:scale-105 transition">
        <p class="text-slate-400">Cancelled</p>
        <h2 id="cancelledBookings" class="text-3xl font-black text-red-300">0</h2>
      </div>

      <div class="glass p-5 rounded-3xl border border-slate-700 hover:scale-105 transition">
        <p class="text-slate-400">Activity</p>
        <h2 id="totalNotifications" class="text-3xl font-black text-yellow-300">0</h2>
      </div>

    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <div class="glass rounded-3xl p-6 border border-slate-700">
        <h2 class="text-2xl font-black mb-4">Add Slot</h2>

        <input id="date" class="w-full mb-3 p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:ring-2 focus:ring-cyan-400" placeholder="Date e.g. 2026-05-29">

        <input id="time" class="w-full mb-3 p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:ring-2 focus:ring-cyan-400" placeholder="Time e.g. 21:00">

        <button onclick="addSlot()" class="bg-yellow-400 text-slate-950 w-full py-4 rounded-2xl font-black hover:scale-105 transition">
          Add Slot
        </button>
      </div>

      <div class="glass rounded-3xl p-6 border border-slate-700 md:col-span-2">
        <h2 class="text-2xl font-black mb-4">All Slots</h2>

        <button onclick="loadSlots()" class="bg-cyan-400 text-slate-950 px-4 py-2 rounded-xl mb-4 font-bold hover:scale-105 transition">
          Refresh Slots
        </button>

        <div id="slots" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
      </div>

    </div>

    <div class="glass rounded-3xl p-6 border border-slate-700 mt-6">
      <h2 class="text-2xl font-black mb-4">Recent Activity</h2>

      <button onclick="loadNotifications()" class="bg-blue-500 px-4 py-2 rounded-xl mb-4 font-bold hover:scale-105 transition">
        Refresh Activity
      </button>

      <div id="notifications" class="space-y-3"></div>
    </div>

    <div class="glass rounded-3xl p-6 border border-slate-700 mt-6">
      <h2 class="text-2xl font-black mb-4">All Bookings</h2>

      <button onclick="loadBookings()" class="bg-purple-500 px-4 py-2 rounded-xl mb-4 font-bold hover:scale-105 transition">
        Refresh Bookings
      </button>

      <div id="bookings" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
    </div>

  </div>

  <script>
    const API = "https://bookbot-ai-booking.onrender.com";

    const user = JSON.parse(localStorage.getItem("bookbot_user"));

    if (!user) {
      window.location.href = "login.html";
    }

    if (user && user.role !== "admin") {
      window.location.href = "dashboard.html";
    }

    document.getElementById("welcome").innerHTML = "Welcome, " + user.name;

    async function loadAnalytics() {
      const response = await fetch(API + "/analytics");
      const data = await response.json();

      document.getElementById("totalCustomers").innerHTML = data.total_customers;
      document.getElementById("totalSlots").innerHTML = data.total_slots;
      document.getElementById("availableSlots").innerHTML = data.available_slots;
      document.getElementById("confirmedBookings").innerHTML = data.confirmed_bookings;
      document.getElementById("cancelledBookings").innerHTML = data.cancelled_bookings;
      document.getElementById("totalNotifications").innerHTML = data.total_notifications;
    }

    async function addSlot() {
      const date = document.getElementById("date").value;
      const time = document.getElementById("time").value;

      if (date === "" || time === "") {
        alert("Please enter date and time");
        return;
      }

      const url =
        API +
        "/slots?date=" +
        encodeURIComponent(date) +
        "&time=" +
        encodeURIComponent(time);

      const response = await fetch(url, {
        method: "POST"
      });

      const data = await response.json();

      alert(data.message);

      document.getElementById("date").value = "";
      document.getElementById("time").value = "";

      loadSlots();
      loadAnalytics();
      loadNotifications();
    }

    async function loadSlots() {
      const response = await fetch(API + "/slots");
      const data = await response.json();

      let html = "";

      for (let slot of data) {
        let statusClass = "text-green-300";
        let statusText = "Available";
        let deleteButton = "";

        if (slot.is_booked === true) {
          statusClass = "text-red-300";
          statusText = "Booked";
        } else {
          deleteButton = `
            <button onclick="deleteSlot(${slot.id})" class="mt-3 bg-red-500 px-3 py-2 rounded-xl font-bold hover:bg-red-400">
              Delete Slot
            </button>
          `;
        }

        html += `
          <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 hover:scale-[1.02] transition">
            <p class="font-bold text-lg">Slot ID: ${slot.id}</p>
            <p class="text-slate-400">${slot.date} at ${slot.time}</p>
            <p class="${statusClass}">Status: ${statusText}</p>
            ${deleteButton}
          </div>
        `;
      }

      document.getElementById("slots").innerHTML = html || "<p>No slots found.</p>";
    }

    async function deleteSlot(slotId) {
      const response = await fetch(API + "/slots/" + slotId, {
        method: "DELETE"
      });

      const data = await response.json();

      alert(data.message);

      loadSlots();
      loadAnalytics();
      loadNotifications();
    }

    async function loadBookings() {
      const response = await fetch(API + "/bookings");
      const data = await response.json();

      let html = "";

      for (let booking of data) {
        let cancelButton = "";

        if (booking.status === "confirmed") {
          cancelButton = `
            <button onclick="cancelBooking(${booking.id})" class="mt-3 bg-red-500 px-3 py-2 rounded-xl font-bold hover:bg-red-400">
              Cancel Booking
            </button>
          `;
        }

        let statusColor = "text-green-300";

        if (booking.status === "cancelled") {
          statusColor = "text-red-300";
        }

        html += `
          <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 hover:scale-[1.02] transition">
            <p class="font-bold text-lg">${booking.customer_name}</p>
            <p class="text-slate-400">${booking.customer_email}</p>
            <p class="text-slate-400">${booking.date} at ${booking.time}</p>
            <p class="text-slate-400">Slot ID: ${booking.slot_id}</p>
            <p class="${statusColor}">Status: ${booking.status}</p>
            ${cancelButton}
          </div>
        `;
      }

      document.getElementById("bookings").innerHTML = html || "<p>No bookings found.</p>";
    }

    async function cancelBooking(bookingId) {
      const response = await fetch(API + "/bookings/" + bookingId, {
        method: "DELETE"
      });

      const data = await response.json();

      alert(data.message);

      loadBookings();
      loadSlots();
      loadAnalytics();
      loadNotifications();
    }

    async function loadNotifications() {
      const response = await fetch(API + "/notifications");
      const data = await response.json();

      let html = "";

      for (let item of data) {
        html += `
          <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
            <p class="font-semibold">${item.message}</p>
            <p class="text-slate-400 text-sm">${item.created_at}</p>
          </div>
        `;
      }

      document.getElementById("notifications").innerHTML = html || "<p>No activity yet.</p>";
    }

    function logout() {
      localStorage.removeItem("bookbot_user");
      window.location.href = "login.html";
    }

    loadAnalytics();
    loadSlots();
    loadBookings();
    loadNotifications();
  </script>

</body>
</html>
