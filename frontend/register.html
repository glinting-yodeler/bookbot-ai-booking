<!DOCTYPE html>
<html>
<head>
  <title>Register - BookBotAI</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, 0.22), transparent 30%),
        radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.20), transparent 30%),
        #020617;
    }

    .glass {
      background: rgba(15, 23, 42, 0.78);
      backdrop-filter: blur(18px);
    }
  </style>
</head>

<body class="text-white min-h-screen flex items-center justify-center px-6">

  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <a href="index.html">
        <img src="assets/bookbotai-logo.png" class="h-20 mx-auto rounded-2xl" alt="BookBotAI Logo">
      </a>
    </div>

    <div class="glass border border-slate-700 p-8 rounded-3xl shadow-2xl">

      <h1 class="text-4xl font-black mb-2">Create account</h1>
      <p class="text-slate-400 mb-6">Start using BookBotAI by Neuriz Solutions.</p>

      <input id="name" class="w-full mb-3 p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:ring-2 focus:ring-cyan-400" placeholder="Full name">

      <input id="email" class="w-full mb-3 p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:ring-2 focus:ring-cyan-400" placeholder="Email">

      <input id="password" type="password" class="w-full mb-3 p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:ring-2 focus:ring-cyan-400" placeholder="Password">

      <select id="role" class="w-full mb-4 p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none focus:ring-2 focus:ring-cyan-400">
        <option value="customer">Customer</option>
        <option value="admin">Admin</option>
      </select>

      <button onclick="register()" class="bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-950 w-full py-4 rounded-2xl font-black hover:scale-105 transition">
        Register
      </button>

      <p id="status" class="text-slate-400 mt-4 text-center"></p>

      <p class="text-slate-400 mt-5 text-center">
        Already have an account?
        <a href="login.html" class="text-cyan-300 font-semibold">Login</a>
      </p>

    </div>

  </div>

  <script>
    const API = "https://bookbot-ai-booking.onrender.com";

    function showStatus(message) {
      document.getElementById("status").innerHTML = message;
    }

    async function register() {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const role = document.getElementById("role").value;

      if (name === "" || email === "" || password === "") {
        showStatus("Please fill all fields.");
        return;
      }

      showStatus("Creating account...");

      const url =
        API +
        "/register?name=" +
        encodeURIComponent(name) +
        "&email=" +
        encodeURIComponent(email) +
        "&password=" +
        encodeURIComponent(password) +
        "&role=" +
        encodeURIComponent(role);

      try {
        const response = await fetch(url, {
          method: "POST"
        });

        const data = await response.json();

        showStatus(data.message);

        if (data.success === true) {
          setTimeout(function () {
            window.location.href = "login.html";
          }, 700);
        }

      } catch (error) {
        showStatus("Could not connect to backend.");
      }
    }
  </script>

</body>
</html>
