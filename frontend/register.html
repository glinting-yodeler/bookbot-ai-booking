<!DOCTYPE html>
<html>
<head>
  <title>Register - BookBot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center">

  <div class="bg-slate-900 p-8 rounded-2xl border border-slate-800 w-full max-w-md">

    <h1 class="text-3xl font-bold mb-2">Create Account</h1>
    <p class="text-slate-400 mb-6">Register for BookBot AI Booking.</p>

    <input id="name" class="w-full mb-3 p-3 rounded-xl bg-slate-800 outline-none focus:ring-2 focus:ring-blue-600" placeholder="Full name">

    <input id="email" class="w-full mb-3 p-3 rounded-xl bg-slate-800 outline-none focus:ring-2 focus:ring-blue-600" placeholder="Email">

    <input id="password" type="password" class="w-full mb-3 p-3 rounded-xl bg-slate-800 outline-none focus:ring-2 focus:ring-blue-600" placeholder="Password">

    <select id="role" class="w-full mb-4 p-3 rounded-xl bg-slate-800 outline-none focus:ring-2 focus:ring-blue-600">
      <option value="customer">Customer</option>
      <option value="admin">Admin</option>
    </select>

    <button onclick="register()" class="bg-blue-600 w-full py-3 rounded-xl font-semibold hover:bg-blue-500">
      Register
    </button>

    <p id="status" class="text-slate-400 mt-4 text-center"></p>

    <p class="text-slate-400 mt-5 text-center">
      Already have an account?
      <a href="login.html" class="text-blue-400">Login</a>
    </p>

  </div>

  <script>
    const API = "https://bookbot-ai-booking.onrender.com";

    async function register() {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const role = document.getElementById("role").value;
      const status = document.getElementById("status");

      if (name === "" || email === "" || password === "") {
        alert("Please fill all fields");
        return;
      }

      status.innerHTML = "Creating account...";

      const url =
        API +
        "/register?name=" +
        encodeURIComponent(name) +
        "&email=" +
        encodeURIComponent(email) +
        "&password=" +
        encodeURIComponent(password) +
        "&role=" +
        encodeURIComponent(role);

      try {
        const response = await fetch(url, {
          method: "POST"
        });

        const data = await response.json();

        status.innerHTML = data.message;
        alert(data.message);

        if (data.success === true) {
          window.location.href = "login.html";
        }
      } catch (error) {
        status.innerHTML = "Could not connect to backend.";
        alert("Could not connect to backend.");
      }
    }
  </script>

</body>
</html>
