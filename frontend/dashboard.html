<!DOCTYPE html>
<html>
<head>
  <title>Customer Dashboard - BookBot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen">

  <div class="max-w-6xl mx-auto p-6">

    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-bold">Customer Dashboard</h1>
        <p id="welcome" class="text-slate-400 mt-1"></p>
      </div>

      <button onclick="logout()" class="bg-red-600 px-4 py-2 rounded-xl hover:bg-red-500">
        Logout
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <div class="bg-slate-900 rounded-2xl p-6 border border-slate-800">
        <h2 class="text-2xl font-semibold mb-4">Available Slots</h2>

        <button onclick="loadSlots()" class="bg-blue-600 px-4 py-2 rounded-xl mb-4 hover:bg-blue-500">
          Refresh Slots
        </button>

        <div id="slots" class="space-y-3"></div>
      </div>

      <div class="bg-slate-900 rounded-2xl p-6 border border-slate-800">
        <h2 class="text-2xl font-semibold mb-4">My Bookings</h2>

        <button onclick="loadMyBookings()" class="bg-purple-600 px-4 py-2 rounded-xl mb-4 hover:bg-purple-500">
          Refresh Bookings
        </button>

        <div id="bookings" class="space-y-3"></div>
      </div>

      <div class="bg-slate-900 rounded-2xl p-6 border border-slate-800">
        <h2 class="text-2xl font-semibold mb-4">My Notifications</h2>

        <button onclick="loadCustomerNotifications()" class="bg-green-600 px-4 py-2 rounded-xl mb-4 hover:bg-green-500">
          Refresh Notifications
        </button>

        <div id="customerNotifications" class="space-y-3"></div>
      </div>

    </div>

    <div class="bg-slate-900 rounded-2xl p-6 border border-slate-800 mt-6">
      <h2 class="text-2xl font-semibold mb-4">AI Chat Assistant</h2>

      <div id="chat" class="bg-slate-950 rounded-xl p-4 h-64 overflow-y-auto mb-3 text-slate-300 space-y-3">
        <div class="bg-slate-800 rounded-xl p-3">
          <p><b>Bot:</b> Hi, I can help you find and book slots. Ask me things like “what slots are available after 7 PM?”</p>
        </div>
      </div>

      <input id="message" class="w-full mb-3 p-3 rounded-xl bg-slate-800 outline-none focus:ring-2 focus:ring-blue-600" placeholder="Ask: what slots are available after 7 PM?">

      <button onclick="sendMessage()" class="bg-blue-600 w-full py-3 rounded-xl font-semibold hover:bg-blue-500">
        Send
      </button>
    </div>

  </div>

  <script>
    const API = "https://bookbot-ai-booking.onrender.com";

    const user = JSON.parse(localStorage.getItem("bookbot_user"));

    if (!user) {
      window.location.href = "login.html";
    }

    if (user && user.role !== "customer") {
      window.location.href = "admin.html";
    }

    document.getElementById("welcome").innerHTML = "Welcome, " + user.name + " (" + user.email + ")";

    async function loadSlots() {
      const response = await fetch(API + "/available-slots");
      const data = await response.json();

      let html = "";

      for (let slot of data) {
        html += `
          <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
            <p class="font-semibold">Slot ID: ${slot.id}</p>
            <p class="text-slate-400">${slot.date} at ${slot.time}</p>
            <button onclick="bookSlot(${slot.id})" class="mt-3 bg-green-600 px-4 py-2 rounded-xl hover:bg-green-500">
              Book This Slot
            </button>
          </div>
        `;
      }

      document.getElementById("slots").innerHTML = html || "<p>No available slots.</p>";
    }

    function buildEmailMessage(data) {
      if (!data.email_result) {
        return "No email result returned from backend.";
      }

      if (data.email_result.success === true) {
        return "Confirmation email sent to: " + data.email_result.to_email;
      }

      return "Booking was saved, but email failed: " + data.email_result.message;
    }

    async function bookSlot(slotId) {
      const url =
        API +
        "/bookings?user_id=" +
        encodeURIComponent(user.id) +
        "&slot_id=" +
        encodeURIComponent(slotId);

      const response = await fetch(url, {
        method: "POST"
      });

      const data = await response.json();

      let finalMessage = data.message;

      if (data.email_result) {
        finalMessage = finalMessage + "\n\n" + buildEmailMessage(data);
      }

      alert(finalMessage);

      console.log("Booking response:", data);

      loadSlots();
      loadMyBookings();
      loadCustomerNotifications();
    }

    async function loadMyBookings() {
      const response = await fetch(API + "/my-bookings/" + user.id);
      const data = await response.json();

      let html = "";

      for (let booking of data) {
        let cancelButton = "";

        if (booking.status === "confirmed") {
          cancelButton = `
            <button onclick="cancelBooking(${booking.id})" class="mt-3 bg-red-600 px-4 py-2 rounded-xl hover:bg-red-500">
              Cancel Booking
            </button>
          `;
        }

        let statusColor = "text-green-400";

        if (booking.status === "cancelled") {
          statusColor = "text-red-400";
        }

        html += `
          <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
            <p class="font-semibold">${booking.date} at ${booking.time}</p>
            <p class="text-slate-400">Slot ID: ${booking.slot_id}</p>
            <p class="${statusColor}">Status: ${booking.status}</p>
            ${cancelButton}
          </div>
        `;
      }

      document.getElementById("bookings").innerHTML = html || "<p>No bookings yet.</p>";
    }

    async function cancelBooking(bookingId) {
      const response = await fetch(API + "/bookings/" + bookingId, {
        method: "DELETE"
      });

      const data = await response.json();

      let finalMessage = data.message;

      if (data.email_result) {
        if (data.email_result.success === true) {
          finalMessage = finalMessage + "\n\nCancellation email sent to: " + data.email_result.to_email;
        } else {
          finalMessage = finalMessage + "\n\nCancellation saved, but email failed: " + data.email_result.message;
        }
      }

      alert(finalMessage);

      console.log("Cancellation response:", data);

      loadSlots();
      loadMyBookings();
      loadCustomerNotifications();
    }

    async function loadCustomerNotifications() {
      const response = await fetch(API + "/customer-notifications/" + user.id);
      const data = await response.json();

      let html = "";

      for (let item of data) {
        html += `
          <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
            <p class="font-semibold">${item.message}</p>
            <p class="text-slate-400 text-sm">${item.created_at}</p>
          </div>
        `;
      }

      document.getElementById("customerNotifications").innerHTML = html || "<p>No notifications yet.</p>";
    }

    async function sendMessage() {
      const messageInput = document.getElementById("message");
      const message = messageInput.value;
      const chat = document.getElementById("chat");

      if (message === "") {
        return;
      }

      chat.innerHTML += `
        <div class="bg-blue-600 rounded-xl p-3">
          <p><b>You:</b> ${message}</p>
        </div>
      `;

      chat.innerHTML += `
        <div id="typing" class="bg-slate-800 rounded-xl p-3">
          <p><b>Bot:</b> Thinking...</p>
        </div>
      `;

      chat.scrollTop = chat.scrollHeight;

      const url =
        API +
        "/ai-chat?user_id=" +
        encodeURIComponent(user.id) +
        "&message=" +
        encodeURIComponent(message);

      try {
        const response = await fetch(url, {
          method: "POST"
        });

        const data = await response.json();

        const typing = document.getElementById("typing");

        if (typing) {
          typing.remove();
        }

        chat.innerHTML += `
          <div class="bg-slate-800 rounded-xl p-3">
            <p><b>Bot:</b> ${data.reply}</p>
          </div>
        `;

      } catch (error) {
        const typing = document.getElementById("typing");

        if (typing) {
          typing.remove();
        }

        chat.innerHTML += `
          <div class="bg-red-900 rounded-xl p-3">
            <p><b>Bot:</b> Could not reach AI assistant.</p>
          </div>
        `;
      }

      messageInput.value = "";
      chat.scrollTop = chat.scrollHeight;
    }

    function logout() {
      localStorage.removeItem("bookbot_user");
      window.location.href = "login.html";
    }

    loadSlots();
    loadMyBookings();
    loadCustomerNotifications();
  </script>

</body>
</html>
